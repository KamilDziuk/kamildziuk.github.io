version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 20

    commit-message:
      prefix: "deps"

    groups:
      react:
        patterns:
          - "react*"

      vite:
        patterns:
          - "vite*"

      types:
        patterns:
          - "@types/*"

      eslint:
        patterns:
          - "eslint*"

      testing:
        patterns:
          - "jest*"
          - "vitest*"
          - "@testing-library/*"
          - "supertest*"

      swc:
        patterns:
          - "@swc/*"

      rollup:
        patterns:
          - "rollup*"
          - "@rollup/*"
